<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email List Comparator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff4466;
    --accent3: #4488ff;
    --text: #e8e8f0;
    --muted: #555570;
    --card: #14141e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(0, 255, 136, 0.144) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(68,136,255,0.04) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 10px;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 24px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .box:focus-within {
    border-color: var(--accent);
  }

  .box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .box-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .box:nth-child(1) .box-label { color: var(--accent); }
  .box:nth-child(2) .box-label { color: var(--accent3); }

  .count-badge {
    background: var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--muted);
    transition: all 0.2s;
  }

  textarea {
    width: 100%;
    height: 260px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    padding: 16px 18px;
  }

  textarea::placeholder { color: var(--muted); }

  .actions {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    flex: 1;
    min-width: 160px;
  }

  .btn-primary:hover { background: #00cc70; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: var(--border);
    color: var(--muted);
  }

  .btn-ghost:hover { background: #2a2a3e; color: var(--text); }

  .results-area {
    max-width: 1100px;
    margin: 0 auto;
    display: none;
  }

  .results-area.show { display: block; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat:nth-child(1) .stat-num { color: var(--accent); }
  .stat:nth-child(2) .stat-num { color: var(--accent2); }
  .stat:nth-child(3) .stat-num { color: var(--accent3); }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .result-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
  }

  .tab {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .tab.active {
    color: #000;
  }

  .tab.tab-unique.active { background: var(--accent); }
  .tab.tab-dup.active { background: var(--accent2); }
  .tab.tab-l2only.active { background: var(--accent3); }

  .result-panel {
    display: none;
  }

  .result-panel.active { display: block; }

  .result-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .result-box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .result-box-title {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
  }

  .copy-btn {
    background: var(--border);
    color: var(--muted);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0;
    text-transform: none;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: #2a2a3e; color: var(--text); }
  .copy-btn.copied { background: var(--accent); color: #000; }

  .email-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 12px 0;
  }

  .email-item {
    padding: 6px 18px;
    font-size: 12px;
    line-height: 1.6;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s;
  }

  .email-item:hover { background: rgba(255,255,255,0.03); }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .panel-unique .dot { background: var(--accent); }
  .panel-dup .dot { background: var(--accent2); }
  .panel-l2only .dot { background: var(--accent3); }

  .email-list::-webkit-scrollbar { width: 4px; }
  .email-list::-webkit-scrollbar-track { background: transparent; }
  .email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>EMAIL COMPARATOR</h1>
  <p>So sánh 2 danh sách — lấy ra email không trùng</p>
</header>

<div class="grid">
  <div class="box">
    <div class="box-header">
      <span class="box-label">List 1</span>
      <span class="count-badge" id="cnt1">0 emails</span>
    </div>
    <textarea id="list1" placeholder="Dán danh sách email vào đây&#10;Mỗi email 1 dòng..."></textarea>
  </div>
  <div class="box">
    <div class="box-header">
      <span class="box-label">List 2</span>
      <span class="count-badge" id="cnt2">0 emails</span>
    </div>
    <textarea id="list2" placeholder="Dán danh sách email vào đây&#10;Mỗi email 1 dòng..."></textarea>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="compare()">⚡ So sánh ngay</button>
  <button class="btn-ghost" onclick="clearAll()">✕ Xóa tất cả</button>
</div>

<div class="results-area" id="results">
  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="stat-unique">0</div>
      <div class="stat-label">Chỉ có trong List 1</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-dup">0</div>
      <div class="stat-label">Trùng cả 2 List</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-l2only">0</div>
      <div class="stat-label">Chỉ có trong List 2</div>
    </div>
  </div>

  <div class="result-tabs">
    <button class="tab tab-unique active" onclick="switchTab('unique')">List 1 không trùng</button>
    <button class="tab tab-dup" onclick="switchTab('dup')">Trùng nhau</button>
    <button class="tab tab-l2only" onclick="switchTab('l2only')">Chỉ trong List 2</button>
  </div>

  <div class="result-panel panel-unique active" id="panel-unique">
    <div class="result-box">
      <div class="result-box-header">
        <span class="result-box-title">Email trong List 1 không có trong List 2</span>
        <button class="copy-btn" onclick="copyList('unique')">Copy</button>
      </div>
      <div class="email-list" id="list-unique"></div>
    </div>
  </div>

  <div class="result-panel panel-dup" id="panel-dup">
    <div class="result-box">
      <div class="result-box-header">
        <span class="result-box-title">Email xuất hiện ở cả hai List</span>
        <button class="copy-btn" onclick="copyList('dup')">Copy</button>
      </div>
      <div class="email-list" id="list-dup"></div>
    </div>
  </div>

  <div class="result-panel panel-l2only" id="panel-l2only">
    <div class="result-box">
      <div class="result-box-header">
        <span class="result-box-title">Email trong List 2 không có trong List 1</span>
        <button class="copy-btn" onclick="copyList('l2only')">Copy</button>
      </div>
      <div class="email-list" id="list-l2only"></div>
    </div>
  </div>
</div>

<script>
  let data = { unique: [], dup: [], l2only: [] };

  function parseEmails(text) {
    return text.split('\n')
      .map(e => e.trim().toLowerCase())
      .filter(e => e.length > 0 && e.includes('@'));
  }

  function updateCount(id, arr) {
    document.getElementById(id).textContent = arr.length + ' email' + (arr.length !== 1 ? 's' : '');
  }

  document.getElementById('list1').addEventListener('input', function() {
    updateCount('cnt1', parseEmails(this.value));
  });

  document.getElementById('list2').addEventListener('input', function() {
    updateCount('cnt2', parseEmails(this.value));
  });

  function compare() {
    const l1 = parseEmails(document.getElementById('list1').value);
    const l2 = parseEmails(document.getElementById('list2').value);
    const set2 = new Set(l2);
    const set1 = new Set(l1);

    data.unique = [...new Set(l1.filter(e => !set2.has(e)))];
    data.dup = [...new Set(l1.filter(e => set2.has(e)))];
    data.l2only = [...new Set(l2.filter(e => !set1.has(e)))];

    document.getElementById('stat-unique').textContent = data.unique.length;
    document.getElementById('stat-dup').textContent = data.dup.length;
    document.getElementById('stat-l2only').textContent = data.l2only.length;

    renderList('list-unique', data.unique, 'panel-unique');
    renderList('list-dup', data.dup, 'panel-dup');
    renderList('list-l2only', data.l2only, 'panel-l2only');

    document.getElementById('results').classList.add('show');
    switchTab('unique');
  }

  function renderList(containerId, emails, panelClass) {
    const el = document.getElementById(containerId);
    if (!emails.length) {
      el.innerHTML = '<div class="empty-state">Không có email nào</div>';
      return;
    }
    el.innerHTML = emails.map(e =>
      `<div class="email-item"><span class="dot"></span>${e}</div>`
    ).join('');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.result-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function copyList(type) {
    const text = data[type].join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = '✓ Đã copy';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function clearAll() {
    document.getElementById('list1').value = '';
    document.getElementById('list2').value = '';
    document.getElementById('cnt1').textContent = '0 emails';
    document.getElementById('cnt2').textContent = '0 emails';
    document.getElementById('results').classList.remove('show');
    data = { unique: [], dup: [], l2only: [] };
  }
</script>
</body>
</html>
